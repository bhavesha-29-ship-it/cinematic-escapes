<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Now | Contact Cinematic Escapes India Travel</title>
    <meta name="description" content="Secure your spot on an exclusive Cinematic Escapes India adventure. Book online or find our Mumbai headquarters on the map.">
    <meta name="keywords" content="travel booking, contact travel agency, India tours, agency map location">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://www.cinematicescapes.com/contact.html">
    <link rel="icon" type="image/png" href="favicon.png">

    <meta property="og:type" content="website">
    <meta property="og:title" content="Book Now | Contact Cinematic Escapes India Tours">
    <meta property="og:description" content="Secure your spot on one of our exclusive Indian travel adventures and find our headquarters.">
    <meta property="og:url" content="https://www.cinematicescapes.com/contact.html">
    <meta name="twitter:card" content="summary">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo"><a href="index.html">Cinematic<span>Escapes</span></a></div>
            <div class="menu-toggle" id="mobile-menu"><span class="bar"></span><span class="bar"></span><span class="bar"></span></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="packages.html">Packages</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html" class="active">Book Now</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h1 class="section-title">Initiate Your Escape</h1>
        
        <div class="form-container">
            <form id="travelForm" action="#" method="POST">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
                </div>
                <div class="form-group">
                    <label for="emailAddress">Email Address</label>
                    <input type="email" id="emailAddress" name="emailAddress" placeholder="you@domain.com" required>
                </div>
                <div class="form-group">
                    <label for="packageSelect">Select Odyssey</label>
                    <select id="packageSelect" name="packageSelect" required>
                        <option value="">-- Select a Destination --</option>
                        <option value="goa">Golden Shores of Goa</option>
                        <option value="jaipur">Royal Crimson of Jaipur</option>
                        <option value="mumbai">Neon Nights of Mumbai</option>
                        <option value="chennai">Horizons of Chennai</option>
                        <option value="kasi">Ethereal Haze of Kasi</option>
                    </select>
                </div>
                <button type="submit" class="btn" style="width: 100%;">Request Booking</button>
            </form>
        </div>

        <!-- NEW MAP / LOCATION SECTION -->
        <h2 class="section-title" style="margin-top: 80px;">Our Headquarters</h2>
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3770.803258703315!2d72.82579911489955!3d18.9287315570535!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3be7d1c73a0d5cad%3A0xc70a25a7209c733c!2sGateway%20Of%20India%20Mumbai!5e0!3m2!1sen!2sin!4v1655000000000!5m2!1sen!2sin" 
                width="100%" 
                height="450" 
                style="border:0;" 
                allowfullscreen="" 
                loading="lazy" 
                title="Cinematic Escapes headquarters location map near Gateway of India, Mumbai"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </main>

    <!-- Live Chat Widget -->
    <div id="chat-widget">
        <button id="chat-toggle" aria-label="Open live chat">💬</button>
        <div id="chat-box" class="hidden">
            <div class="chat-header">
                <span>Cinematic Escapes Concierge</span>
                <button id="chat-close" aria-label="Close chat">&times;</button>
            </div>
            <div id="chat-messages">
                <div class="chat-msg bot">Hi there! 👋 How can we help plan your next escape?</div>
            </div>
            <form id="chat-form">
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off" required>
                <button type="submit">Send</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
